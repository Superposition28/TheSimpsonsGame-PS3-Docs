# Source: \GAMEFILES\USRDIR\ASSETS_1_AUDIO_STREAMS\EN

# KEY
# File pattern format:
#   d_<char><set?>_<ctx>_<id>_<ch?>.exa.snu
# where:
#   d_ = dialogue
#   <char> = short character code (e.g., as=alien, fr=French guy, lg=logger, moe/moer=Moe, uter=Üter, teen=Squeaky-Voiced Teen, etc.)
#   <set?> = optional two-digit set number tied to the numbered bank (e.g., as01, fr02, lg02)
#   <ctx> = tiny context chunk (e.g., xxx for generic; others include igc for cutscenes, level tags like gr/bsh/nvq, etc.)
#   <id> = 7-digit line index

# <ch?> ambient audio files in the global folder often have _qd as an indicator that they are quad channel audio not duel channel

# snu format known by vgmstream

## 'EN' audio files

# Dialogue -- 7315

- EN-Dialogue:
    -   OLD_DIR_NAME: 01_xxx_0
        NEW_DIR_NAME: generic_1
        files:
        -   CharacterName: Alien_1
            Level: Invasion of the Yokel-Snatchers?
            file_patterns:
                file_pattern: d_as01_xxx_#######.exa.snu
                file_regex: ^d_as01_xxx_[0-9a-fA-F]{7}\.exa\.snu$
                file_glob: d_as01_xxx_[0-9A-Fa-f][0-9A-Fa-f][0-9A-Fa-f][0-9A-Fa-f][0-9A-Fa-f][0-9A-Fa-f][0-9A-Fa-f].exa.snu
